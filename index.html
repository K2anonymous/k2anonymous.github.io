<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0b0f;--surface:#111318;--surface2:#181b22;--border:#1e2230;
      --accent:#00e5ff;--accent2:#7c3aed;--accent3:#f59e0b;
      --text:#e8eaf0;--muted:#6b7280;--dim:#3a3f52;
      --font-display:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--font-body:'Fraunces',serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.7;overflow-x:hidden;cursor:none}

    /* CURSOR */
    .cursor{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:screen}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(0,229,255,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s}

    /* NOISE + SCANLINES */
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.6}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3.5rem;border-bottom:1px solid var(--border);background:rgba(10,11,15,.88);backdrop-filter:blur(18px)}
    .nav-logo{font-family:var(--font-display);font-weight:800;font-size:1.1rem;letter-spacing:-.02em;color:var(--text);text-decoration:none}
    .nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover{color:var(--accent)}
    .nav-resume{display:flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;transition:all .25s}
    .nav-resume:hover{background:var(--accent);color:var(--bg)}
    .nav-resume svg{width:12px;height:12px}

    /* SECTION SHARED */
    section{padding:7rem 4rem}
    .section-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:4rem}
    .section-num{font-size:.68rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
    .section-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-.03em;line-height:1}
    .section-line{flex:1;height:1px;background:var(--border)}
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
    .reveal.visible{opacity:1;transform:none}

    /* ═══════════════════════════════════════
       HERO
    ═══════════════════════════════════════ */
    .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 4rem;gap:4rem;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(0,229,255,.04) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 10% 80%,rgba(124,58,237,.05) 0%,transparent 60%);pointer-events:none}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 70% 50%,black 0%,transparent 80%);opacity:.4;animation:gridDrift 20s linear infinite}
    @keyframes gridDrift{from{background-position:0 0}to{background-position:60px 60px}}
    .hero-left{position:relative;z-index:2}
    .hero-tag{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s ease .2s forwards}
    .hero-tag::before{content:'';display:block;width:24px;height:1px;background:var(--accent)}
    #role-word{border-right:2px solid var(--accent);animation:caretBlink .75s step-end infinite}
    @keyframes caretBlink{0%,100%{border-color:var(--accent)}50%{border-color:transparent}}
    .hero-name{font-family:var(--font-display);font-size:clamp(3rem,7vw,6rem);font-weight:800;line-height:.95;letter-spacing:-.04em;margin-bottom:1rem;opacity:0;animation:fadeUp .8s ease .4s forwards}
    .hero-name .line2{color:var(--accent)}
    .hero-tagline{font-family:var(--font-body);font-style:italic;font-size:1.05rem;color:var(--muted);margin-bottom:2.5rem;opacity:0;animation:fadeUp .8s ease .6s forwards}
    .hero-bio{font-size:.82rem;color:#8b93a8;line-height:1.9;max-width:480px;margin-bottom:3rem;opacity:0;animation:fadeUp .8s ease .8s forwards}
    .hero-cta{display:flex;gap:1rem;opacity:0;animation:fadeUp .8s ease 1s forwards;flex-wrap:wrap}
    .btn{padding:.75rem 1.75rem;font-family:var(--font-mono);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:all .25s;display:inline-flex;align-items:center;gap:.5rem;cursor:none}
    .btn-primary{background:var(--accent);color:var(--bg);font-weight:500}
    .btn-primary:hover{background:#fff;box-shadow:0 0 30px rgba(0,229,255,.3);transform:translateY(-2px)}
    .btn-ghost{border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
    .btn-dl{border:1px solid var(--accent2);color:var(--accent2)}
    .btn-dl:hover{background:var(--accent2);color:#fff;transform:translateY(-2px);box-shadow:0 0 24px rgba(124,58,237,.3)}

    /* TERMINAL */
    .hero-right{position:relative;z-index:2;opacity:0;animation:fadeIn 1s ease 1.2s forwards}
    .terminal{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03)}
    .terminal-bar{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
    .t-dot{width:11px;height:11px;border-radius:50%}
    .t-dot.red{background:#ff5f57}.t-dot.yellow{background:#febc2e}.t-dot.green{background:#28c840}
    .terminal-title{margin:0 auto;font-size:.7rem;color:var(--muted);letter-spacing:.05em}
    .terminal-body{padding:1.5rem;font-size:.78rem;line-height:2}
    .t-line{display:flex;align-items:baseline;gap:.5rem}
    .t-prompt{color:var(--accent);flex-shrink:0}.t-cmd{color:#a5b4fc}.t-comment{color:var(--dim);font-style:italic}
    .t-out{color:#6ee7b7;padding-left:1.2rem}.t-section{color:var(--accent3);padding-left:1.2rem}
    .t-cursor{display:inline-block;width:8px;height:14px;background:var(--accent);animation:blink 1.1s step-end infinite;vertical-align:middle;margin-left:2px}
    @keyframes blink{50%{opacity:0}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ═══════════════════════════════════════
       SKILLS
    ═══════════════════════════════════════ */
    #skills{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .skill-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1.5rem;transition:border-color .25s,transform .25s;position:relative;overflow:hidden}
    .skill-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
    .skill-card:hover{border-color:var(--dim);transform:translateY(-3px)}
    .skill-card:hover::before{opacity:1}
    .skill-cat{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
    .skill-items{display:flex;flex-wrap:wrap;gap:.5rem}
    .skill-tag{background:var(--surface2);border:1px solid var(--border);padding:.25rem .6rem;border-radius:2px;font-size:.72rem;color:#9ca3af;transition:all .2s}
    .skill-tag:hover{border-color:var(--accent);color:var(--accent)}

    /* ═══════════════════════════════════════
       EXPERIENCE
    ═══════════════════════════════════════ */
    .timeline{position:relative;padding-left:2rem}
    .timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent),var(--accent2),transparent)}
    .timeline-item{position:relative;margin-bottom:3.5rem;padding-bottom:3.5rem;border-bottom:1px solid var(--border)}
    .timeline-item:last-child{border-bottom:none;margin-bottom:0}
    .timeline-dot{position:absolute;left:-2.45rem;top:.4rem;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
    .exp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem}
    .exp-role{font-family:var(--font-display);font-size:1.2rem;font-weight:700;letter-spacing:-.01em}
    .exp-company{color:var(--accent);font-size:.8rem;margin-top:.2rem}
    .exp-date{font-size:.7rem;color:var(--muted);letter-spacing:.08em;white-space:nowrap;margin-top:.3rem}
    .exp-bullets{list-style:none;margin-top:.75rem}
    .exp-bullets li{position:relative;padding-left:1.2rem;color:#8b93a8;font-size:.8rem;margin-bottom:.5rem}
    .exp-bullets li::before{content:'›';position:absolute;left:0;color:var(--accent);font-size:1rem;line-height:1.5}

    /* ═══════════════════════════════════════
       AWARDS
    ═══════════════════════════════════════ */
    #awards{border-top:1px solid var(--border)}
    .awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
    .award-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem;transition:all .25s}
    .award-card:hover{border-color:var(--accent3);transform:translateY(-2px)}
    .award-icon-wrap{width:36px;height:36px;border-radius:50%;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .award-text{font-size:.8rem;color:var(--text);line-height:1.4}
    .award-sub{font-size:.68rem;color:var(--muted);margin-top:.15rem}

    /* ═══════════════════════════════════════
       3D FILM-STRIP CAROUSEL
    ═══════════════════════════════════════ */
    #gallery{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden}
    .carousel-scene{
      width:100%;
      height:320px;           /* smaller scene height */
      perspective:1400px;
      position:relative;display:flex;align-items:center;justify-content:center;
    }
    .carousel-ring{
      width:120px;height:160px;   /* base card size — compact */
      position:relative;transform-style:preserve-3d;
      animation:ringRotate 45s linear infinite;
      transition:animation-play-state .5s;
    }
    .carousel-ring.paused{animation-play-state:paused}
    @keyframes ringRotate{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}

    .film-card{
      position:absolute;
      top:0;left:0;
      width:120px;height:160px;
      border-radius:10px;
      overflow:hidden;
      border:1.5px solid var(--border);
      background:var(--surface2);
      cursor:none;
      backface-visibility:hidden;
      transition:border-color .3s;
    }
    .film-card:hover{ border-color:var(--dim); }
    .film-card-inner{width:100%;height:100%;border-radius:10px;overflow:hidden;position:relative;}
    .film-card img{width:100%;height:100%;object-fit:cover;display:block}
    .film-card-placeholder{
      width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.4rem;padding:.6rem;text-align:center;
    }
    .film-card-placeholder .fc-icon{font-size:1.4rem}
    .film-card-placeholder .fc-label{
      font-family:var(--font-display);font-size:.6rem;font-weight:700;
      color:var(--text);line-height:1.2;
    }
    .film-card-placeholder .fc-sub{font-size:.5rem;color:var(--muted)}
    .film-card .film-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(10,11,15,.9) 0%,transparent 55%);
      opacity:0;transition:opacity .3s;
      display:flex;align-items:flex-end;padding:.6rem;
      font-size:.58rem;color:var(--text);line-height:1.3;
    }
    .film-card:hover .film-overlay{opacity:1}
    .carousel-hint{display:none}

    /* ═══════════════════════════════════════
       PROJECTS with ASCII art
    ═══════════════════════════════════════ */
    #projects{border-top:1px solid var(--border)}
    .projects-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem}

    /* RoboHand panel — same size as peer cards */
    .robohand-panel{
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      overflow:hidden;display:flex;flex-direction:column;
      transition:border-color .3s;
    }
    .robohand-panel:hover{border-color:var(--dim)}
    .robohand-anim{
      background:var(--bg);padding:1.5rem;border-bottom:1px solid var(--border);
      font-family:var(--font-mono);font-size:.72rem;line-height:1.25;
      color:var(--accent);min-height:190px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .robohand-anim::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(0,229,255,.03) 0%,transparent 70%);
    }
    .robohand-anim pre{position:relative;z-index:1;white-space:pre;text-shadow:0 0 8px rgba(0,229,255,.4)}
    .rh-frame-label{
      font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:.5rem;
    }
    .robohand-info{padding:1.75rem}
    .robohand-info .project-type{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);margin-bottom:.75rem}
    .robohand-info .project-name{font-family:var(--font-display);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:1rem}
    .robohand-info .project-desc{font-size:.82rem;color:#8b93a8;line-height:1.85;margin-bottom:1.5rem}
    .robohand-info .project-tags{display:flex;flex-wrap:wrap;gap:.4rem}

    /* Regular project cards with ASCII art */
    .project-card{
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      overflow:hidden;transition:all .3s;position:relative;
    }
    .project-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
    .project-card:hover{border-color:var(--dim);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.4)}
    .project-card:hover::after{transform:scaleX(1)}

    .ascii-art-zone{
      background:var(--bg);padding:1.5rem;border-bottom:1px solid var(--border);
      font-family:var(--font-mono);font-size:.72rem;line-height:1.3;
      display:flex;align-items:center;justify-content:center;
      min-height:140px;position:relative;overflow:hidden;
    }
    .ascii-art-zone pre{
      color:var(--accent);white-space:pre;text-align:center;
      transition:transform .5s cubic-bezier(.34,1.56,.64,1),color .3s;
      text-shadow:0 0 6px rgba(0,229,255,.35);
      transform-style:preserve-3d;
    }
    .project-card:hover .ascii-art-zone pre{
      color:#fff;text-shadow:0 0 12px rgba(0,229,255,.7);
    }
    /* 3D spin on hover */
    .ascii-spin pre{animation:none}
    .project-card:hover .ascii-spin pre{animation:asciiSpin 1.2s cubic-bezier(.4,0,.2,1) forwards}
    @keyframes asciiSpin{
      0%{transform:rotateY(0deg)}
      40%{transform:rotateY(180deg)}
      100%{transform:rotateY(360deg)}
    }

    .project-body{padding:1.75rem}
    .project-type{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);margin-bottom:.6rem}
    .project-name{font-family:var(--font-display);font-size:1.1rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.6rem}
    .project-desc{font-size:.78rem;color:#8b93a8;line-height:1.8;margin-bottom:1.1rem}
    .project-tags{display:flex;flex-wrap:wrap;gap:.4rem}
    .p-tag{font-size:.65rem;padding:.2rem .55rem;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);color:var(--accent);border-radius:2px;letter-spacing:.06em}

    /* ═══════════════════════════════════════
       WORK & WRITING + YOUTUBE CARD
    ═══════════════════════════════════════ */
    #links{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}

    /* YouTube hero card — spans full width */
    .yt-hero-card{
      grid-column:1/-1;
      background:var(--bg);border:1px solid var(--border);border-radius:6px;
      padding:2rem 2.5rem;
      display:flex;align-items:center;justify-content:space-between;gap:2rem;
      text-decoration:none;color:var(--text);
      transition:all .3s;position:relative;overflow:hidden;
    }
    .yt-hero-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,0,0,.04) 0%,transparent 60%);transition:opacity .3s}
    .yt-hero-card:hover{border-color:#ff4444;transform:translateY(-2px);box-shadow:0 16px 40px rgba(255,0,0,.1)}
    .yt-left{display:flex;align-items:center;gap:1.5rem}
    .yt-play-btn{width:64px;height:64px;border-radius:50%;background:rgba(255,0,0,.15);border:2px solid rgba(255,80,80,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
    .yt-hero-card:hover .yt-play-btn{background:rgba(255,0,0,.3);border-color:#ff4444;box-shadow:0 0 24px rgba(255,0,0,.3)}
    .yt-play-btn svg{width:24px;height:24px;fill:#ff6666;margin-left:3px}
    .yt-text{}
    .yt-eyebrow{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:#ff6666;margin-bottom:.35rem}
    .yt-title{font-family:var(--font-display);font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.4rem}
    .yt-sub{font-size:.78rem;color:var(--muted)}
    .yt-arrow{font-size:2rem;color:var(--dim);transition:all .3s}
    .yt-hero-card:hover .yt-arrow{color:#ff6666;transform:translateX(6px)}

    .link-card{
      display:flex;align-items:center;gap:1rem;
      background:var(--bg);border:1px solid var(--border);border-radius:4px;
      padding:1.25rem 1.5rem;text-decoration:none;color:var(--text);
      transition:all .25s;position:relative;overflow:hidden;
    }
    .link-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--accent2));transform:scaleY(0);transform-origin:top;transition:transform .3s}
    .link-card:hover{border-color:var(--dim);transform:translateX(4px);background:var(--surface)}
    .link-card:hover::before{transform:scaleY(1)}
    .link-icon{font-size:1.4rem;flex-shrink:0;transition:transform .3s}
    .link-card:hover .link-icon{transform:scale(1.15)}
    .link-meta{flex:1;min-width:0}
    .link-type{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.15rem}
    .link-name{font-size:.85rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .link-arrow{color:var(--dim);font-size:1rem;transition:all .2s}
    .link-card:hover .link-arrow{color:var(--accent);transform:translateX(3px)}

    /* ═══════════════════════════════════════
       CONTACT
    ═══════════════════════════════════════ */
    #contact{border-top:1px solid var(--border)}
    .contact-inner{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:600px;margin:0 auto;gap:2.5rem;}
    .contact-blurb{font-family:var(--font-body);font-size:1.2rem;font-weight:300;line-height:1.9;color:#9ca3af;font-style:italic;max-width:500px;}
    .contact-blurb strong{color:var(--text);font-style:normal;font-weight:400}

// Hero tag — animated role cycler
(function heroTyper(){
  const el = document.getElementById('hero-tag');
  const roles = [
    "IT","Creative","Fabrication","Digital Media",
    "Systems Support","VR Development","Communications","Innovation","Emerging Technologies"
  ];
  const prefix = "Available for ";
  const suffix = " Roles · Class of 2026";

  // Build the tag HTML once — role word is a <span> we swap
  el.innerHTML = `${prefix}<span id="role-word" style="color:#fff;border-right:2px solid var(--accent);padding-right:2px"></span>${suffix}`;
  const roleEl = document.getElementById('role-word');

  let ri = 0;         // role index
  let ci = 0;         // char index
  let deleting = false;
  const TYPE_SPEED   = 80;
  const DELETE_SPEED = 45;
  const PAUSE_FULL   = 1800; // pause when fully typed
  const PAUSE_EMPTY  = 300;  // pause before typing next

  function tick() {
    const word = roles[ri];
    if (!deleting) {
      // typing
      ci++;
      roleEl.textContent = word.slice(0, ci);
      if (ci === word.length) {
        // fully typed — pause then start deleting
        deleting = true;
        setTimeout(tick, PAUSE_FULL);
        return;
      }
      setTimeout(tick, TYPE_SPEED);
    } else {
      // deleting
      ci--;
      roleEl.textContent = word.slice(0, ci);
      if (ci === 0) {
        // fully deleted — move to next word
        deleting = false;
        ri = (ri + 1) % roles.length;
        setTimeout(tick, PAUSE_EMPTY);
        return;
      }
      setTimeout(tick, DELETE_SPEED);
    }
  }

  // Start after the hero fade-in
  setTimeout(tick, 1400);
})();

(function buildCarousel(){
  const ring  = document.getElementById('carouselRing');
  const scene = document.getElementById('carouselScene');
  const N = CONFIG.carousel.length;
  const CW = 120, CH = 160;
  const radius = Math.round((CW / 2) / Math.tan(Math.PI / N)) + 20;

  ring.style.width = CW + 'px';
  ring.style.height = CH + 'px';
  scene.style.height = '320px';

  CONFIG.carousel.forEach((slide, i) => {
    const angle = (360 / N) * i;
    const card = document.createElement('div');
    card.className = 'film-card';
    card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

    const inner = document.createElement('div');
    inner.className = 'film-card-inner';

    if (slide.imageSrc) {
      inner.innerHTML = `<img src="${slide.imageSrc}" alt="${slide.label}"/>
        <div class="film-overlay">${slide.label}</div>`;
    } else {
      inner.innerHTML = `
        <div class="film-card-placeholder">
          <div class="fc-icon">${slide.icon}</div>
          <div class="fc-label">${slide.label}</div>
          <div class="fc-sub">${slide.sub}</div>
        </div>`;
    }
    card.appendChild(inner);
    ring.appendChild(card);
  });
})();

/* ══════════════════════════════════════════════════
   CURSOR
══════════════════════════════════════════════════ */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px'});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
document.querySelectorAll('a,button,.skill-tag,.project-card,.award-card,.link-card,.film-card,.robohand-panel,.yt-hero-card').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursor.style.width='18px';cursor.style.height='18px';ring.style.width='52px';ring.style.height='52px'});
  el.addEventListener('mouseleave',()=>{cursor.style.width='10px';cursor.style.height='10px';ring.style.width='36px';ring.style.height='36px'});
});

/* ══════════════════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════════════════ */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}});
},{threshold:.08});
document.querySelectorAll('.reveal').forEach(r=>observer.observe(r));
</script>
